spring:
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jobtracker}
    username: ${DB_USER:jobtracker}
    password: ${DB_PASSWORD:jobtracker}
    hikari:
      connection-timeout: 20000
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-very-long-random-secret-key-at-least-32chars}
    expiration-ms: 86400000
  auth:
    username: ${APP_USERNAME:admin}
    password: ${APP_PASSWORD:changeme}
  aws:
    bucket-name: ${AWS_BUCKET_NAME:}
    region: ${AWS_REGION:ap-southeast-2}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: claude-sonnet-4-6
  groq:
    api-key: ${GROQ_API_KEY:}
    model: llama-3.3-70b-versatile
  adzuna:
    app-id: ${ADZUNA_APP_ID:}
    app-key: ${ADZUNA_APP_KEY:}
  tavily:
    api-key: ${TAVILY_API_KEY:}

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

logging:
  level:
    com.jobtracker: DEBUG
    org.springframework.security: INFO
