version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: jobtracker-postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-jobtracker}
      POSTGRES_USER: ${DB_USER:-jobtracker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-jobtracker}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-jobtracker}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
